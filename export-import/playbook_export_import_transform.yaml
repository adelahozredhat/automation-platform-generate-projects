---
- hosts: localhost
  gather_facts: false
  vars:
    job_template_name: "Prueba"
    job_template_folder: "{{job_template_name|replace(' ','_')}}"
    relation_ve_ee:
      "/opt/my-envs/custom-venv/": "ee_example"
      "/var/lib/awx/venv/ansible/": "ee_ansible"
      "/var/lib/awx/venv/applications_env/": "ee_applications_env"
      "/var/lib/awx/venv/applications_env_python3/": "ee_applications_env_python3"
      "/var/lib/awx/venv/awx/": "ee_awx"
      "/var/lib/awx/venv/cloud_azure/": "ee_cloud_azure"
      "/var/lib/awx/venv/cloud_azure2/": "ee_cloud_azure2"
      "/var/lib/awx/venv/collection_fetch_repo/": "ee_collection_fetch_repo"
      "/var/lib/awx/venv/networking_aos_cx/": "ee_networking_aos_cx"
      "/var/lib/awx/venv/networking_env/": "ee_networking_env"
      "/var/lib/awx/venv/networking_f5_bigip/": "ee_networking_f5_bigip"
      "/var/lib/awx/venv/openshift/": "ee_openshift"
      "/var/lib/awx/venv/tower_export/": "ee_tower_export"
  vars_files:
    - vault.yaml
  tasks:
    - name: Creates directory
      ansible.builtin.file:
        path: "{{job_template_folder}}"
        state: directory

    - name: Export job_templates tower
      awx.awx.export:
        job_templates: "{{job_template_name}}"
        controller_host: "{{ controller_hostname_old }}"
        controller_username: "{{ controller_username_old }}"
        controller_password: "{{ controller_password_old }}"
        validate_certs: "{{ controller_validate_certs_old }}"
      register: export_job_templates_output

    - debug:
        msg: "{{export_job_templates_output}}"

    - set_fact:
        controller_job_templates_content: |-
          {"controller_templates":
            [
            {% for jobtemplates in export_job_templates_output.assets.job_templates %}
              {
              "allow_simultaneous": {{jobtemplates.allow_simultaneous}},
              "ask_credential_on_launch": {{jobtemplates.allow_simultaneous}},
              "ask_diff_mode_on_launch": {{jobtemplates.allow_simultaneous}},
              "ask_inventory_on_launch": {{jobtemplates.allow_simultaneous}},
              "ask_job_type_on_launch": {{jobtemplates.allow_simultaneous}},
              "ask_limit_on_launch": {{jobtemplates.allow_simultaneous}},
              "ask_scm_branch_on_launch": {{jobtemplates.allow_simultaneous}},
              "ask_skip_tags_on_launch": {{jobtemplates.allow_simultaneous}},
              "ask_tags_on_launch": {{jobtemplates.allow_simultaneous}},
              "ask_variables_on_launch": {{jobtemplates.allow_simultaneous}},
              "ask_verbosity_on_launch": {{jobtemplates.allow_simultaneous}},
              "become_enabled": {{jobtemplates.allow_simultaneous}},
              {%- if jobtemplates.custom_virtualenv -%}
              "execution_environment": "{{relation_ve_ee[jobtemplates.custom_virtualenv]}}",
              {% endif %}
              "description": "{{jobtemplates.description}}",
              "diff_mode": {{jobtemplates.diff_mode}},
              {%- if jobtemplates.extra_vars | from_yaml -%}
              "extra_vars": {{jobtemplates.extra_vars| from_yaml }},
              {% endif %}
              "force_handlers": {{jobtemplates.force_handlers}},
              "forks": {{jobtemplates.forks}},
              "host_config_key": "{{jobtemplates.host_config_key}}",
              "inventory": {{jobtemplates.inventory}},
              "job_slice_count": {{jobtemplates.job_slice_count}},
              "job_tags": "{{jobtemplates.job_tags}}",
              "job_type": "{{jobtemplates.job_type}}",
              "limit": "{{jobtemplates.limit}}",
              "name": "{{jobtemplates.name}}",
              "playbook": "{{jobtemplates.playbook}}",
              "project": {{jobtemplates.project}},
              "scm_branch": "{{jobtemplates.scm_branch}}",
              "skip_tags": "{{jobtemplates.skip_tags}}",
              "start_at_task": "{{jobtemplates.start_at_task}}",
              "survey_enabled": {{jobtemplates.survey_enabled}},
              "timeout": {{jobtemplates.timeout}},
              "use_fact_cache": {{jobtemplates.use_fact_cache}},
              "verbosity": {{jobtemplates.verbosity}},
              {%- if jobtemplates.webhook_credential -%}
              "webhook_credential": {{jobtemplates.webhook_credential| default(omit)}},
              {% endif %}
              "webhook_service": "{{jobtemplates.webhook_service}}",
              "credentials": 
              [
              {% for credentials_list_names in jobtemplates.related.credentials %}
              "{{credentials_list_names.name}}",
              {% endfor %}
              ]
              },
            {% endfor %}
            ]
          }

    - debug:
        msg: "{{controller_job_templates_content}}"

    - set_fact:
        controller_templates: "{{controller_job_templates_content.controller_templates}}"

    - debug:
        msg: "{{controller_templates}}"

    - copy: content="{{ controller_job_templates_content | to_yaml}}" dest="{{job_template_folder}}/controller_job_templates.yml"

    - name: Export projects tower
      awx.awx.export:
        projects: "{{ item.project.name }}"
        controller_host: "{{ controller_hostname_old }}"
        controller_username: "{{ controller_username_old }}"
        controller_password: "{{ controller_password_old }}"
        validate_certs: "{{ controller_validate_certs_old }}"
      register: export_output_projects
      loop: "{{export_job_templates_output.assets.job_templates}}"

    - set_fact:
        controller_projects_content: |-
          {"controller_projects":
            [
            {% for results in export_output_projects.results %}
              {% for projects in results.assets.projects %}
                {
                {%- if projects.custom_virtualenv -%}
                "default_environment": "{{relation_ve_ee[projects.custom_virtualenv]}}",
                {% endif %}
                "allow_override": {{projects.allow_override}},
                {%- if projects.credential -%}
                "credential": "{{projects.credential.name}}",
                {% endif %}
                "description": "{{projects.description}}",
                "local_path": "{{projects.local_path}}",
                "name": "{{projects.name}}",
                "organization": {{projects.organization}},
                "scm_branch": "{{projects.scm_branch}}",
                "scm_clean": {{projects.scm_clean}},
                "scm_delete_on_update": {{projects.scm_delete_on_update}},
                "scm_refspec": "{{projects.scm_refspec}}",
                "scm_type": "{{projects.scm_type}}",
                "scm_update_cache_timeout": {{projects.scm_update_cache_timeout}},
                "scm_update_on_launch": {{projects.scm_update_on_launch}},
                "scm_url": "{{projects.scm_url}}",
                "timeout": {{projects.timeout}},
                },
              {% endfor %}
            {% endfor %}
            ]
          }

    - debug:
        msg: "{{controller_projects_content}}"

    - set_fact:
        controller_projects: "{{controller_projects_content.controller_projects}}"

    - debug:
        msg: "{{controller_projects}}"

    - copy: content="{{ controller_projects_content | to_yaml}}" dest="{{job_template_folder}}/controller_projects.yml"
        
    - name: Export inventory tower
      awx.awx.export:
        inventory: "{{ item.inventory.name }}"
        controller_host: "{{ controller_hostname_old }}"
        controller_username: "{{ controller_username_old }}"
        controller_password: "{{ controller_password_old }}"
        validate_certs: "{{ controller_validate_certs_old }}"
      register: export_output_inventories
      loop: "{{export_job_templates_output.assets.job_templates}}"

    - set_fact:
        controller_inventories_content: |-
          {"controller_inventories":
            [
            {% for results in export_output_inventories.results %}
              {% for inventory_info in results.assets.inventory %}
                {
                "description": "{{inventory_info.description}}",
                {%- if inventory_info.host_filter -%}
                "host_filter": {{inventory_info.host_filter}},
                {% endif %}
                "kind": "{{inventory_info.kind}}",
                "name": "{{inventory_info.name}}",
                "organization": {{inventory_info.organization}},
                {%- if inventory_info.variables | from_yaml -%}
                "variables": {{inventory_info.variables| from_yaml }}
                {% endif %}
                },
              {% endfor %}
            {% endfor %}
            ]
          }

    - debug:
        msg: "{{controller_inventories_content}}"

    - set_fact:
        controller_inventories: "{{controller_inventories_content.controller_inventories}}"

    - debug:
        msg: "{{controller_inventories}}"

    - copy: content="{{ controller_inventories_content | to_yaml}}" dest="{{job_template_folder}}/controller_inventories.yml"

    - set_fact:
        credentials_list_names: |-
          [
          {% for jobtemplates in export_job_templates_output.assets.job_templates %}
            {% for credential_list in jobtemplates.related.credentials %}
              {%- if credential_list.name != "Demo Credential" -%}
              "{{credential_list.name}}",
              {% endif %}
            {% endfor %}
          {% endfor %}
          {% for results in export_output_projects.results %}
              {% for projects in results.assets.projects %}
                {%- if projects.credential -%}
                "{{projects.credential.name}}",
                {% endif %}
              {% endfor %}
            {% endfor %}
          ]

    - debug:
        msg: "{{credentials_list_names}}"

    - block:
        
      - name: Export credentials tower
        awx.awx.export:
          credentials: "{{ credentials_list_names }}"
          controller_host: "{{ controller_hostname_old }}"
          controller_username: "{{ controller_username_old }}"
          controller_password: "{{ controller_password_old }}"
          validate_certs: "{{ controller_validate_certs_old }}"
        register: export_output_credentials

      - set_fact:
          controller_credentials_content: |-
            {"controller_credentials":
              [
              {% for credential in export_output_credentials.assets.credentials %}
                {
                "name": "{{credential.name}}",
                "credential_type": "{{credential.credential_type.name}}",
                "description": "{{credential.description}}",
                "inputs": {{credential.inputs|replace("$encrypted$","")}},
                "organization": "{{credential.organization.name}}"
                },
              {% endfor %}
              ]
            }

      - debug:
          msg: "{{controller_credentials_content}}"

      - set_fact:
          controller_credentials: "{{controller_credentials_content.controller_credentials}}"

      - debug:
          msg: "{{controller_credentials}}"

      - copy: content="{{ controller_credentials_content | to_yaml}}" dest="{{job_template_folder}}/controller_credentials.yml"
          
      - name: Export credential_types tower
        awx.awx.export:
          credential_types: "{{ item.credential_type.name }}"
          controller_host: "{{ controller_hostname_old }}"
          controller_username: "{{ controller_username_old }}"
          controller_password: "{{ controller_password_old }}"
          validate_certs: "{{ controller_validate_certs_old }}"
        register: export_output_credential_types
        loop: "{{export_output_credentials.assets.credentials}}"

      - set_fact:
          controller_credential_types_content: |-
            {"controller_credential_types":
              [
              {% for result in export_output_credential_types.results %}
                {% for credential_type in result.assets.credential_types %}
                  {%- if credential_type.name != "Machine" and credential_type.name != "Source Control" -%}
                  {
                  "description": "{{credential_type.description}}",
                  "injectors": {{credential_type.injectors}},
                  "inputs": {{credential_type.inputs}},
                  "kind": "{{credential_type.kind}}",
                  "name": "{{credential_type.name}}",
                  },
                  {% endif %}
                {% endfor %}
              {% endfor %}
              ]
            }

      - debug:
          msg: "{{controller_credential_types_content}}"

      - set_fact:
          controller_credential_types: "{{controller_credential_types_content.controller_credential_types}}"

      - debug:
          msg: "{{controller_credential_types}}"

      - copy: content="{{ controller_credential_types_content | to_yaml}}" dest="{{job_template_folder}}/controller_credential_types.yml"


      when: credentials_list_names|length>0

    - set_fact:
        organizations_list_names: |-
          [
          {% for jobtemplates in export_job_templates_output.assets.job_templates %}
            "{{jobtemplates.natural_key.organization.name}}",
          {% endfor %}
          {% for results in export_output_projects.results %}
            {% for projects in results.assets.projects %}
              "{{projects.organization.name}}",
            {% endfor %}
          {% endfor %}
          {% for results in export_output_inventories.results %}
            {% for inventory in results.assets.inventory %}
              "{{inventory.organization.name}}",
            {% endfor %}
          {% endfor %}
          {%- if export_output_credentials.assets is defined -%}
            {% for credential in export_output_credentials.assets.credentials %}
               "{{credential.organization.name}}",
            {% endfor %}
          {% endif %}
          ]

    - block:

      - debug:
          msg: "{{organizations_list_names}}"
          
      - name: Export organizations tower
        awx.awx.export:
          organizations: "{{ organizations_list_names }}"
          controller_host: "{{ controller_hostname_old }}"
          controller_username: "{{ controller_username_old }}"
          controller_password: "{{ controller_password_old }}"
          validate_certs: "{{ controller_validate_certs_old }}"
        register: export_output_organizations

      - set_fact:
          controller_organizations_content: |-
            {"controller_organizations":
              [
              {% for organization in export_output_organizations.assets.organizations %}
                {%- if organization.name != "Default" -%}
                {
                {%- if organization.custom_virtualenv -%}
                "default_environment": "{{relation_ve_ee[organization.custom_virtualenv]}}",
                {% endif %}
                "description": "{{organization.description}}",
                "max_hosts": {{organization.max_hosts}},
                "name": "{{organization.name}}",
                "natural_key": {{organization.natural_key}},
                "related": {{organization.related}}
                },
                {% endif %}
              {% endfor %}
              ]
            }

      - debug:
          msg: "{{controller_organizations_content}}"

      - set_fact:
          controller_organizations: "{{controller_organizations_content.controller_organizations}}"

      - debug:
          msg: "{{controller_organizations}}"

      - copy: content="{{ controller_organizations_content | to_yaml}}" dest="{{job_template_folder}}/controller_organizations.yml"


      when: organizations_list_names|length>0

- hosts: localhost
  gather_facts: false
  vars_files:
    - vault.yaml

  pre_tasks:
    - name: "Setup authentication (block)"
      block:
        - name: "Get the Authentication Token for the future requests"
          ansible.builtin.uri:
            url: "https://{{ controller_hostname }}/api/v2/tokens/"
            user: "{{ controller_username }}"
            password: "{{ controller_password }}"
            method: POST
            force_basic_auth: true
            validate_certs: "{{ controller_validate_certs }}"
            status_code: 201
          register: authtoken_res

        - name: "Set the oauth token to be used since now"
          ansible.builtin.set_fact:
            controller_oauthtoken: "{{ authtoken_res.json.token }}"
            controller_oauthtoken_url: "{{ authtoken_res.json.url }}"
      no_log: "{{ controller_configuration_filetree_read_secure_logging | default('false') }}"
      when: controller_oauthtoken is not defined
      tags:
        - always
  roles:
    - {role: infra.controller_configuration.dispatch}

  post_tasks:
    - name: "Delete the Authentication Token used"
      ansible.builtin.uri:
        url: "https://{{ controller_hostname }}{{ controller_oauthtoken_url }}"
        user: "{{ controller_username }}"
        password: "{{ controller_password }}"
        method: DELETE
        force_basic_auth: true
        validate_certs: "{{ controller_validate_certs }}"
        status_code: 204
      when: controller_oauthtoken_url is defined
...